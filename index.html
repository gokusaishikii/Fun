document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;transition:opacity .15s ease;\">COLLECTION ARRAY<\u002Fdiv>\n      <div style=\"position:absolute;left:49.5%;right:-2.5%;top:42px;height:1px;background:#1a1714;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- bottom-left hint -->\n  <div id=\"hint\" style=\"position:absolute;bottom:5%;left:2.7%;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.5px;color:#8a8178;user-select:none;z-index:3;\">HOVER · CLICK TO OPEN · ←→ NAVIGATE · ESC TO CLOSE · MOVE TO EDGES TO PAN<\u002Fdiv>\n\n  <!-- bottom-right powered by -->\n  \n\n  <!-- mobile modal background overlay -->\n  <div id=\"ip-overlay\" style=\"display:none;position:fixed;inset:0;background:rgba(0,0,0,0.2);opacity:0;pointer-events:none;z-index:9;transition:opacity .3s ease;\"><\u002Fdiv>\n\n  <!-- right information panel (selected state) -->\n  <div id=\"info-panel\" style=\"position: absolute; left: 50%; right: 48px; top: 50%; transform: translateY(-50%); max-height: calc(100% - 128px); overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-start; padding: 48px; opacity: 0; pointer-events: none; z-index: 10; font-family: 'Space Grotesk', sans-serif; color: #1A1714; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); background-color: rgba(255,255,255,0.85); border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; box-shadow: none\">\n\n    <!-- CANCEL button (mobile modal only) -->\n    <button id=\"ip-cancel\" aria-label=\"Close\" style=\"display:none;position:absolute;top:14px;right:14px;width:44px;height:44px;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:400;line-height:1;color:#1A1714;background:transparent;border:none;cursor:pointer;padding:0;z-index:2;\">×<\u002Fbutton>\n\n    <!-- EMPTY default view: only the add prompt -->\n    <div id=\"ip-empty\" style=\"display:none; flex:1; flex-direction:column; justify-content:center; align-items:flex-start;\">\n      <button id=\"ip-add\" style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;letter-spacing:1.5px;color:#1A1714;background:transparent;border:none;padding:0;cursor:pointer;text-align:left;\">ADD A NEW COLLECTION →<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- READ-ONLY view: saved content + EDIT -->\n    <div id=\"ip-read\" style=\"display:none; flex-direction:column;\">\n      <div id=\"ip-eyebrow\" style=\"font-family:'Space Grotesk',sans-serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#1A1714;\">DATE 20062026<\u002Fdiv>\n      <div id=\"ip-title\" style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;letter-spacing:1px;line-height:1.05;color:#1A1714;margin-top:24px;\">FILE NO.001<\u002Fdiv>\n      <div id=\"ip-desc\" style=\"font-family:'Space Grotesk',sans-serif;font-size:15px;line-height:1.8;color:#1A1714;white-space:pre-line;margin-top:32px;\">An encrypted Rhine Lab research record. Originium-arts telemetry, field observations and synthesis logs are sealed within this acrylic archive plate, awaiting authorized review.<\u002Fdiv>\n      <button id=\"ip-edit\" style=\"margin-top:48px;align-self:flex-start;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:#1A1714;background:transparent;border:1px solid #1A1714;padding:8px 12px;cursor:pointer;transition:background .15s ease,color .15s ease;\">EDIT →<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- EDIT view: type + title + description + SAVE (mandatory order) -->\n    <div id=\"ip-editview\" style=\"display:none; flex-direction:column;\">\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a8178;margin-bottom:8px;\">TYPE<\u002Fdiv>\n      <div id=\"ip-typegroup\" style=\"display:flex;flex-direction:column;gap:9px;\">\n        <label style=\"display:flex;align-items:center;gap:9px;font-family:'Space Grotesk',sans-serif;font-size:14px;letter-spaci :3px;padding:9px 11px;outline:none;resize:none;\"><\u002Ftextarea>\n      <div id=\"ip-imghint\" style=\"font-family:'Space Grotesk',sans-serif;font-size:12px;line-height:1.6;color:#8a8178;margin-top:16px;\">Click the “+” on the card to add a square image (JPG / PNG / WebP).<\u002Fdiv>\n      <button id=\"ip-save\" style=\"margin-top:28px;align-self:flex-start;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:#1A1714;background:transparent;border:1px solid #1A1714;padding:8px 12px;cursor:pointer;transition:background .15s ease,color .15s ease;\">SAVE →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    if (window.__threeReady) this.init();\n    else window.addEventListener('three-ready', () => this.init(), { once: true });\n  }\n  componentWillUnmount() {\n    this._stop = true;\n    cancelAnimationFrame(this._raf);\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('keydown', this._onKey);\n    if (this._onVis) document.removeEventListener('visibilitychange', this._onVis);\n    if (this._renderer) this._renderer.dispose();\n  }\n\n  init() {\n    const THREE = window.THREE;\n    const TWEEN = window.TWEEN;\n    const RoomEnvironment = window.__RoomEnvironment;\n    const RoundedBoxGeometry = window.__RoundedBoxGeometry;\n    const mount = document.getElementById('rhine-stage');\n    if (!mount || this._renderer) return;\n    this.THREE = THREE; this.TWEEN = TWEEN;\n    this.isMobile = window.innerWidth < 768;     // <768px → mobile mode\n    this.waveAmp = this.isMobile ? 0.105 : 0.15; // wave amplitude reduced 30% on mobile\n\n    const W = mount.clientWidth || window.innerWidth;\n    const H = mount.clientHeight || window.innerHeight;\n\n    // ---- renderer ----\n    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, this.isMobile ? 1.5 : 2)); // lower sampling on mobile\n    renderer.setSize(W, H);\n    renderer.toneMapping = THREE.ACESFilmicToneMapping;\n    renderer.toneMappingExposure = 1.04;\n    renderer.outputColorSpace = THREE.SRGBColorSpace;\n    renderer.shadowMap.enabled = false;\n    mount.appendChild(renderer.domElement);\n    this._renderer = renderer;\n\n    // ---- scene ----\n    const scene = new THREE.Scene();\n    scene.background = new THREE.Color('#EDE8E0');\n    scene.fog = new THREE.Fog('#EDE8E0', 42, 118);\n    this.scene = scene;\n\n    // ---- camera: orthographic isometric ----\n    this._viewSize = 5;\n    const aspect = W / H;\n    const vs = this._viewSize;\n    const camera = new THREE.OrthographicCamera(-vs * aspect / 2, vs * aspect / 2, vs / 2, -vs / 2, -300, 800);\n    this.camStart = new THREE.Vector3(-40, 18, 18);\n    camera.position.copy(this.camStart);\n    this.camOffset = new THREE.Vector3(0, 0, 0).sub(this.camStart); // target(0,0,0) - pos\n    camera.lookAt(0, 0, 0);\n    this.camera = camera;\n\n    // ---- env ----\n    const pmrem = new THREE.PMREMGenerator(renderer);\n    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;\n\n    // ---- card dims ----\n    const TH = 0.3, BH = 3, BW = 3;\n    this.TH = TH; this.BH = BH; this.BW = BW;\n    const bodyMat = new THREE.MeshStandardMaterial({ color: new THREE.Color('#F2EDE6'), roughness: 0.18, metalness: 0, emissive: new THREE.Color('#F8E9D2'), emissiveIntensity: 0.06, side: THREE.DoubleSide });\n    // NOTE: per spec all cards share ONE MeshStandardMaterial at all times — no material switching.\n\n    const bodyGeo = new RoundedBoxGeometry(TH, BH, BW, 3, 0.04);\n    const coverGeo = new THREE.PlaneGeometry(BW * 0.98, BH * 0.98);\n    coverGeo.rotateY(-Math.PI / 2); // faces -X\n    this._bodyGeo = bodyGeo; this._coverGeo = coverGeo;   // reused for per-card filled meshes\n    this._defaultCoverCanvas = this.makeCoverCanvas();\n    const coverTex = new THREE.CanvasTexture(this._defaultCoverCanvas);\n    coverTex.colorSpace = THREE.SRGBColorSpace; coverTex.anisotropy = 4;\n    const coverMat = new THREE.MeshStandardMaterial({ map: coverTex, color: 0xffffff, roughness: 0.22, metalness: 0 });\n\n    // ---- grid ----\n    const COLS = this.isMobile ? 24 : 58, ROWS = this.isMobile ? 12 : 26; // fewer cards on mobile (perf)\n    const dx = TH * 3, dz = BW * 1.2;\n    const N = COLS * ROWS;\n    const x0 = -((COLS - 1) * dx) / 2;\n    const z0 = -((ROWS - 1) * dz) / 2;\n    this.N = N; this.COLS = COLS; this.ROWS = ROWS;\n    this.coverOff = TH / 2 + 0.002;\n\n    const bodies = new THREE.InstancedMesh(bodyGeo, bodyMat, N);\n    const covers = new THREE.InstancedMesh(coverGeo, coverMat, N);\n    // invisible raycast hit proxies — fixed at each card's base front face, NEVER move\n    const hitGeo = new THREE.PlaneGeometry(BW * 0.98, BH * 0.98); hitGeo.rotateY(-Math.PI / 2); // exact visible front-face size, no padding\n    const hitMat = new THREE.MeshBasicMaterial({ colorWrite: false, depthWrite: false, depthTest: false });\n    const hits = new THREE.InstancedMesh(hitGeo, hitMat, N);\n    this.bodies = bodies; this.covers = covers; this.hits = hits;\n    this._fixedY = new Float32Array(N);\n\n    const baseX = new Float32Array(N), baseZ = new Float32Array(N);\n    const d = new THREE.Object3D();\n    let i = 0;\n    for (let r = 0; r < ROWS; r++) {\n      for (let c = 0; c < COLS; c++) {\n        const x = x0 + c * dx, z = z0 + r * dz;\n        baseX[i] = x; baseZ[i] = z;\n        const y = Math.sin(z * 0.25) * this.waveAmp;\n        d.position.set(x, y, z); d.rotation.set(0, 0, 0); d.scale.set(1, 1, 1); d.updateMatrix();\n        bodies.setMatrixAt(i, d.matrix);\n        d.position.set(x - this.coverOff, y, z); d.updateMatrix();\n        covers.setMatrixAt(i, d.matrix);\n        hits.setMatrixAt(i, d.matrix);     // hit proxy: fixed base front face\n        this._fixedY[i] = y;\n        i++;\n      }\n    }\n    bodies.instanceMatrix.needsUpdate = true;\n    covers.instanceMatrix.needsUpdate = true;\n    hits.instanceMatrix.needsUpdate = true;\n    this.baseX = baseX; this.baseZ = baseZ;\n    this._dummy = new THREE.Object3D();\n\n    // ---- group ----\n    const arrayGroup = new THREE.Group();\n    arrayGroup.add(bodies, covers, hits);\n    const railMat = new THREE.MeshStandardMaterial({ color: new THREE.Color('#C8C2BB'), roughness: 0.3, metalness: 0.15 });\n    const railLen = (COLS - 1) * dx + 1.2;\n    const railGeo = new THREE.BoxGeometry(railLen, 0.2, 0.5);\n    for (let r = 0; r < ROWS; r++) {\n      const rail = new THREE.Mesh(railGeo, railMat);\n      rail.position.set(0, -BH / 2 - 0.15, z0 + r * dz);\n      arrayGroup.add(rail);\n    }\n    arrayGroup.rotation.y = Math.PI * 0.42;\n    arrayGroup.updateMatrixWorld(true);\n    scene.add(arrayGroup);\n    this.arrayGroup = arrayGroup;\n\n    // ---- single reusable ACTIVE proxy (same material as the array; only renders on top) ----\n    const proxy = new THREE.Group();\n    const proxyBodyMat = bodyMat.clone();   // normal depth — rail still obscures it on hover\n    const proxyBody = new THREE.Mesh(bodyGeo, proxyBodyMat);\n    const proxyCoverMat = new THREE.MeshStandardMaterial({ map: coverTex, color: 0xffffff, roughness: 0.22, metalness: 0 });\n    const proxyCover = new THREE.Mesh(coverGeo, proxyCoverMat);\n    proxyCover.position.x = -this.coverOff;\n    proxy.add(proxyBody, proxyCover);\n    proxy.visible = false;\n    proxy.renderOrder = 999; proxyBody.renderOrder = 999; proxyCover.renderOrder = 1000;\n    scene.add(proxy);\n    this.proxy = proxy; this.proxyBody = proxyBody; this.proxyCover = proxyCover;\n\n    // dedicated proxy cover texture: lets the raised card show per-card imagery / edit states\n    this._proxyCanvas = document.createElement('canvas'); this._proxyCanvas.width = 600; this._proxyCanvas.height = 600;\n    this.proxyTex = new THR {\n    x.fillStyle = '#F4EFE8'; x.fillRect(0, 0, S, S);\n    const m = S * 0.15, cw = S * 0.70;\n    x.fillStyle = '#F7F2EB'; x.fillRect(m, m, cw, cw);\n    x.strokeStyle = 'rgba(120,110,98,0.16)'; x.lineWidth = 1.5; x.strokeRect(m, m, cw, cw);\n    const cx = S * 0.5, cy = S * 0.5, ro = S * 0.27, ri = S * 0.085;\n    const g = x.createRadialGradient(cx, cy, ri, cx, cy, ro);\n    g.addColorStop(0, 'rgba(228,222,212,0.0)');\n    g.addColorStop(0.55, 'rgba(214,206,194,0.42)');\n    g.addColorStop(0.97, 'rgba(228,221,210,0.28)');\n    g.addColorStop(1, 'rgba(244,239,232,0)');\n    x.fillStyle = g; x.beginPath(); x.arc(cx, cy, ro, 0, Math.PI * 2); x.fill();\n    x.strokeStyle = 'rgba(150,140,128,0.10)'; x.lineWidth = 1.5;\n    for (let rr = ri + 12; rr < ro; rr += 11) { x.beginPath(); x.arc(cx, cy, rr, 0, Math.PI * 2); x.stroke(); }\n    x.strokeStyle = 'rgba(120,110,98,0.20)'; x.lineWidth = 2;\n    x.beginPath(); x.arc(cx, cy, ro, 0, Math.PI * 2); x.stroke();\n    x.fillStyle = '#F7F2EB'; x.beginPath(); x.arc(cx, cy, ri, 0, Math.PI * 2); x.fill();\n    x.strokeStyle = 'rgba(120,110,98,0.20)'; x.beginPath(); x.arc(cx, cy, ri, 0, Math.PI * 2); x.stroke();\n    x.beginPath(); x.arc(cx, cy, ri * 0.5, 0, Math.PI * 2); x.stroke();\n  }\n  // ---- top-left label, ALWAYS drawn last so it sits on top of any cover image ----\n  drawLabel(x, S, l1, l2) {\n    const lx = 24, ly = 24, lw = S * 0.34, lh = S * 0.115;\n    x.fillStyle = '#FCFAF6'; x.fillRect(lx, ly, lw, lh);\n    x.strokeStyle = '#1a1714'; x.lineWidth = 2; x.strokeRect(lx, ly, lw, lh);\n    x.save(); x.beginPath(); x.rect(lx, ly, lw, lh); x.clip();\n    x.fillStyle = '#1a1714'; x.textAlign = 'left'; x.textBaseline = 'middle';\n    x.font = '700 22px \"Space Mono\", monospace';\n    x.fillText(String(l1 || 'TITLE').toUpperCase(), lx + 12, ly + lh * 0.34);\n    x.font = '700 14px \"Space Mono\", monospace';\n    x.fillText(String(l2 || 'TYPE').toUpperCase(), lx + 12, ly + lh * 0.74);\n    x.restore();\n  }\n  // ---- bottom-right barcode + unique id, ALWAYS on top; bars are deterministic per id ----\n  drawBarcode(x, S, idText) {\n    const bw = 132, bh = 40, bx = S - 24 - bw, by = S - 24 - bh - 22;\n    x.fillStyle = 'rgba(252,250,246,0.82)'; x.fillRect(bx - 8, by - 6, bw + 16, bh + 34);\n    let seed = 0; const s = String(idText || 'X-000');\n    for (let k = 0; k < s.length; k++) seed = (seed * 31 + s.charCodeAt(k)) >>> 0;\n    const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };\n    let px = bx;\n    while (px < bx + bw) {\n      const ww = 1 + Math.floor(rnd() * 3);\n      x.fillStyle = rnd() > 0.42 ? 'rgba(80,74,66,0.72)' : 'rgba(80,74,66,0.0)';\n      x.fillRect(px, by, ww, bh); px += ww + 1;\n    }\n    x.fillStyle = 'rgba(60,54,46,0.85)'; x.font = '700 13px \"Space Mono\", monospace';\n    x.textAlign = 'right'; x.fillText(s, S - 24, by + bh + 12); x.textAlign = 'left';\n  }\n  typeFull(ab) { return ({ AUD: 'AUDIO', VID: 'VIDEO', GAM: 'GAME', BK: 'BOOK' })[ab] || ''; }\n  // unified front-face painter for the raised proxy and per-card filled meshes (Feature 5 draw order)\n  paintFace(x, S, card, coverImg, mode) {\n    x.clearRect(0, 0, S, S);\n    if (mode === 'dashed') {\n      x.fillStyle = '#F4EFE8'; x.fillRect(0, 0, S, S);\n      x.strokeStyle = 'rgba(120,110,98,0.55)'; x.lineWidth = 4; x.setLineDash([18, 14]);\n      x.strokeRect(30, 30, S - 60, S - 60); x.setLineDash([]);\n      x.strokeStyle = 'rgba(90,84,76,0.75)'; x.lineWidth = 10; x.lineCap = 'round';\n      x.beginPath(); x.moveTo(S / 2, S * 0.36); x.lineTo(S / 2, S * 0.64);\n      x.moveTo(S * 0.36, S / 2); x.lineTo(S * 0.64, S / 2); x.stroke();\n    } else if (mode === 'cover') {\n      if (coverImg && coverImg.complete && coverImg.naturalWidth) x.drawImage(coverImg, 0, 0, S, S);\n      else { x.fillStyle = '#F4EFE8'; x.fillRect(0, 0, S, S); }   // placeholder while decoding\n    } else {\n      this.drawDefaultBg(x, S);\n    }\n    // 2) label then 3) barcode — always tom) / H;\n    const fwd = new THREE.Vector3(); cam.getWorldDirection(fwd);\n    const right = new THREE.Vector3().crossVectors(fwd, cam.up); right.y = 0; right.normalize();\n    const moveR = -dx * wppx;      // content tracks finger horizontally\n    const moveY = dy * wppy;       // content tracks finger vertically\n    const p = cam.position;\n    p.x = Math.max(-50, Math.min(50, p.x + right.x * moveR));\n    p.z = Math.max(-50, Math.min(50, p.z + right.z * moveR));\n    p.y = Math.max(-50, Math.min(50, p.y + moveY));\n    this._inertiaV = { r: moveR, y: moveY };       // remember last-frame velocity for inertia\n  }\n  updateInertia() {\n    const v = this._inertiaV; if (!v) return;\n    if (Math.abs(v.r) < 1e-4 && Math.abs(v.y) < 1e-4) return;\n    const THREE = this.THREE, cam = this.camera;\n    const fwd = new THREE.Vector3(); cam.getWorldDirection(fwd);\n    const right = new THREE.Vector3().crossVectors(fwd, cam.up); right.y = 0; right.normalize();\n    const p = cam.position;\n    p.x = Math.max(-50, Math.min(50, p.x + right.x * v.r));\n    p.z = Math.max(-50, Math.min(50, p.z + right.z * v.r));\n    p.y = Math.max(-50, Math.min(50, p.y + v.y));\n    v.r *= 0.92; v.y *= 0.92;                       // natural deceleration\n  }\n\n  // ===== mobile modal show/hide (slide + overlay) =====\n  openModal() {\n    const p = document.getElementById('info-panel');\n    const ov = document.getElementById('ip-overlay');\n    if (ov) { ov.style.transition = 'opacity .3s ease'; ov.style.opacity = '1'; ov.style.pointerEvents = 'auto'; }\n    if (p) {\n      p.style.transition = 'opacity .3s ease, transform .3s cubic-bezier(.215,.61,.355,1)';\n      p.style.pointerEvents = 'auto';\n      p.classList.remove('mobile-open');\n      void p.offsetWidth;                          // reflow so the slide-up animates from the offset\n      p.style.opacity = '1';\n      p.classList.add('mobile-open');\n    }\n  }\n  closeModal() {\n    const p = document.getElementById('info-panel');\n    const ov = document.getElementById('ip-overlay');\n    if (ov) { ov.style.opacity = '0'; ov.style.pointerEvents = 'none'; }\n    if (p) {\n      p.style.transition = 'opacity .3s ease, transform .3s cubic-bezier(.215,.61,.355,1)';\n      p.style.opacity = '0'; p.style.pointerEvents = 'none';\n      p.classList.remove('mobile-open');\n    }\n  }\n\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
