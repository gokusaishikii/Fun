document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

3 16.9193 31.6668 18.3332 31.6668C21.5087 31.6668 24.3386 30.1866 26.1704 27.8786C27.393 26.3381 29.363 25.2502 31.2335 25.858Z\" fill=\"#EDEAE2\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:#1A1815\">PROJECT FILE LOADED <span style=\"display:inline-block;width:8px;height:8px;background:#E8701E;margin-left:2px;vertical-align:0\"><\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;color:#8a8578;margin-top:2px\">{{ f.section }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- code line + lime ticks -->\n      <div style=\"position:relative;z-index:1;display:flex;align-items:center;gap:14px;margin:14px 2px 12px\">\n        <span style=\"display:inline-block;width:9px;height:9px;background:#E8A020\"><\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;letter-spacing:.08em;color:#EDEAE2\">{{ f.code }}<\u002Fspan>\n        <span style=\"display:flex;gap:6px\"><span style=\"width:9px;height:9px;border-radius:50%;border:1.5px solid #B9D40A\"><\u002Fspan><span style=\"width:9px;height:9px;border-radius:50%;border:1.5px solid #B9D40A\"><\u002Fspan><span style=\"width:9px;height:9px;border-radius:50%;background:#B9D40A\"><\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- PROFILE table -->\n      <div style=\"position:relative;z-index:1;background:rgba(247,245,239,.7);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(26,24,21,.16)\">\n        <div style=\"display:inline-block;background:#1A1815;color:#EDEAE2;font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:.14em;padding:4px 14px\">PROFILE<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:auto 1fr;gap:0 18px;padding:12px 16px 14px\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:#8a8578;padding:5px 0\">ROLE<\u002Fdiv>\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;padding:5px 0;text-align:right\">{{ f.role }}<\u002Fdiv>\n          <div style=\"grid-column:1/3;height:1px;background:rgba(26,24,21,.1)\"><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:#8a8578;padding:5px 0\">YEAR<\u002Fdiv>\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;padding:5px 0;text-align:right\">{{ f.year }}<\u002Fdiv>\n          <div style=\"grid-column:1/3;height:1px;background:rgba(26,24,21,.1)\"><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:#8a8578;padding:5px 0\">SCOPE<\u002Fdiv>\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;padding:5px 0;text-align:right\">{{ f.scope }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- section profile blurb -->\n      <div style=\"position:relative;z-index:1;margin-top:14px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;color:#8a8578;margin-bottom:7px\">SECTION PROFILE<\u002Fdiv>\n        <p style=\"margin:0;font-size:14px;line-height:1.62;color:#ccc7bd;max-width:42ch\">{{ f.intro }}<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- footer actions -->\n      <div style=\"position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px;flex-wrap:wrap\">\n        <button onclick=\"{{ closeFile }}\" style=\"cursor:pointer;background:none;border:1px solid rgba(237,234,226,.32);color:#EDEAE2;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;padding:11px 14px\" style-hover=\"background:#EDEAE2;color:#1A1815;border-color:#EDEAE2\">✕ CLOSE<\u002Fbutton>\n        <a href=\"{{ f.href }}\" style=\"display:inline-flex;align-items:center;gap:9px;text-decoration:none;background:#E8A020;color:#1A1815;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:11px 18px\" style-hover=\"background:#fff\">Open File <span style=\"font-size:14px\">↗<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <\u002Fdiv>\n     <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- hint -->\n  <div style=\"position:absolute;z-index:4;left:50%;bottom:84px;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;color:#8a8578;pointer-events:none;text-align:center\">{{ hint }}<\u002Fdiv>\n\n  <!-- controls -->\n  <div style=\"position:absolute;z-index:6;bottom:26px;left:40px;display:flex;align-items:center;gap:18px\">\n    <a href=\"Home.dc.html\" style=\"text-decoration:none;color:#1A1815;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;opacity:.32;transition:opacity .25s\" style-hover=\"opacity:.85\">← INDEX (2D)<\u002Fa>\n    <button onclick=\"{{ replayIntro }}\" title=\"Replay boot\" style=\"cursor:pointer;color:#1A1815;background:none;border:none;padding:0;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;opacity:.32;transition:opacity .25s\" style-hover=\"opacity:.85\">↻ REPLAY<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- powered by -->\n  <div data-parallax=\"\" data-depth=\"6\" style=\"position:absolute;z-index:5;bottom:30px;right:40px;display:flex;align-items:center;gap:10px;pointer-events:none\">\n    <span style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em\">POWERED BY<\u002Fspan>\n    <span style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;letter-spacing:.02em\">SPECOS<\u002Fspan>\n    <span style=\"display:inline-block;width:16px;height:4px;background:#1A1815\"><\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:800},&quot;introEnabled&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;soundEnabled&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E8701E&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    // 5 projects — empiriecom & XKool high priority, newest = the AI one\n    this.files = [\n      {idx:'001', code:'X-001', title:'empiriecom', cat:'UX · WORKING STUDENT', section:'BUSINESS SECTION', sec3:'BUS', role:'UX Designer', year:'2024', scope:'Enterprise E-Commerce', intro:'Redesigned the Drupal preview workflow so editors validate any content under real publishing conditions — without ever leaving the preview surface.', href:'Work-empiriecom.dc.html', cell:[11,3], hot:true},\n      {idx:'002', code:'X-002', title:'XKool', cat:'INTERACTION · INTERN', section:'STRUCTURAL SECTION', sec3:'STRU', role:'Interaction Designer', year:'2023', scope:'AI Architecture', intro:'Interaction design for AI-driven architectural planning — turning generative spatial output into a controllable, legible design tool.', href:'#', cell:[17,3], hot:true},\n      {idx:'005', code:'X-005', title:\"AI is smart enough, let's just point and talk to it\", cat:'PRODUCT · CONCEPT', section:'COGNITION SECTION', sec3:'COG', role:'Product / AI UX', year:'2025', scope:'Agentic Interface', intro:'A spatial, point-and-speak interface concept: the model is capable enough that the UI dissolves into gesture and natural language rather than menus.', href:'#', cell:[14,4], hot:true},\n      {idx:'003', code:'X-003', title:'HabPack', cat:'ACADEMIC · UI / UX', section:'ECOLOGICAL SECTION', sec3:'ECO', role:'UI / UX Designer', year:'2023', scope:'Travel Assistant', intro:'An AI packing assistant for travelers who need faster, calmer, more confident preparation before every trip.', href:'#', cell:[6,2]},\n      {idx:'004', code:'X-004', title:'FinFlow', cat:'ACADEMIC · PRODUCT', section:'ENERGY SECTION', sec3:'ENE', role:'Product Designer', year:'2022', scope:'Personal Finance', intro:'A budgeting companion, saving planner and lightweight financial advisor unified into one calm, legible tool.', href:'#', cell:[22,2]},\n    ];\n    this.state = { hov:-1, sel:-1, shown:false, panelPhase:null, lastSel:-1 };\n    let s = true; try { s = sessionStorage.getItem('rhineSound') !== '0'; } catch(e){}\n    this.soundOn = (this.props.soundEnabled === false) ? false : s;\n    this._timers = []; this.mouse = {x:0,y:0};\n    // ---- 3D parallax state (driven per-frame in render loop, all lerp 0.05) ----\n    this.camOff = {x:0,y:0};                          // camera offset from rest pose\n    this.panel = {tx:0,ty:0,rx:-3,ry:5,init:false};   // info-panel: px offset + base rotations (deg)\n    this.ACCENT = this.props.accent || '#E8701E';\n  }\n\n  renderVals(){\n    const sel = this.state.sel, hov = this.state.hov, phase = this.state.panelPhase;\n    const fIndex = phase === 'close' ? (this.state.lastSel >= 0 ? this.state.lastSel : 0)\n                 : (sel >= 0 ? sel : (hov >= 0 ? hov : 0));\n    const f = this.files[fIndex];\n    let statusText = 'SELECTING FILES';\n    if (sel >= 0) statusText = this.files[sel].code + '  —  ' + this.files[sel].sec3;\n    else if (hov >= 0) statusText = 'FILE NUMBER: ' + this.files[hov].code;\n    const out = Object.assign({}, f);\n    const L = (f.title||'').length;\n    out.titleSize = L > 30 ? '25px' : (L > 14 ? '34px' : '46px');\n    return {\n      statusText,\n      loading: (sel < 0 && hov < 0),\n      hint: sel >= 0 ? 'FILE EXTRACTED · CLICK ANOTHER PLATE OR CLOSE' : 'HOVER A RAISED PLATE · CLICK TO EXTRACT FILE',\n      hasSel: phase !== null,\n      panelPhase: p
